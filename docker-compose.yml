services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proofile_dev}
      POSTGRES_USER: ${POSTGRES_USER:-proofile_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proofile_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - proofile-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proofile_user} -d ${POSTGRES_DB:-proofile_dev}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - proofile-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./backend:/app
      - backend_cache:/app/.cache
    working_dir: /app
    env_file: .env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: "postgresql+asyncpg://proofile_user:proofile_password@postgres:5432/proofile_dev"
    networks:
      - proofile-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    command: /bin/sh /app/scripts/entrypoint.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_DISABLE_TRANSPILE_CACHE=1
      - BACKEND_INTERNAL_URL=http://backend:8000
    networks:
      - proofile-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    command: npm run dev

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://proofile_user:proofile_password@postgres:5432/proofile_dev
    volumes:
      - ./backend:/app
      - backend_cache:/app/.cache
    working_dir: /app
    networks:
      - proofile-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.celery_app.celery_app worker --loglevel=info -Q default,documents,emails,scrapers

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://proofile_user:proofile_password@postgres:5432/proofile_dev
    volumes:
      - ./backend:/app
      - backend_cache:/app/.cache
    working_dir: /app
    networks:
      - proofile-network
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    restart: unless-stopped
    command: celery -A app.celery_app.celery_app beat --loglevel=info

  scraping-engine:
    build:
      context: ./scraping-engine
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/1
      - REDIS_QUEUE_NAME=raw_opportunities
      - LOG_LEVEL=INFO
      - SCRAPE_INTERVAL_HOURS=${SCRAPE_INTERVAL_HOURS:-12}
    volumes:
      - ./scraping-engine:/app
    working_dir: /app
    networks:
      - proofile-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: poetry run python scheduler.py

  ai-pipeline:
    build:
      context: ./ai-pipeline
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/1
      - BACKEND_API_URL=http://backend:8000/api/v1
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-dev-secret-change-in-production}
      - HEALTH_PORT=9091
      - MIN_QUALITY_SCORE=${MIN_QUALITY_SCORE:-0.3}
    volumes:
      - ./ai-pipeline:/app
    working_dir: /app
    networks:
      - proofile-network
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    command: python -m queue_consumers.raw_data_consumer

  dlq-consumer:
    build:
      context: ./ai-pipeline
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/1
      - MAX_DLQ_RETRIES=5
      - DLQ_BASE_BACKOFF=60
      - DLQ_CHECK_INTERVAL=30
    volumes:
      - ./ai-pipeline:/app
    working_dir: /app
    networks:
      - proofile-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python -m queue_consumers.dlq_consumer

networks:
  proofile-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_cache:
  frontend_node_modules:
