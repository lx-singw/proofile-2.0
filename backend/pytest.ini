[pytest]
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    anonymous: Tests for anonymous user access
    authenticated: Tests for authenticated user access
    paywall: Tests for paywall functionality
    integration: Integration tests
    e2e: End-to-end tests
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
